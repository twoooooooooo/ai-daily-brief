name: Scheduled Briefing Jobs

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Manual scheduled task to run"
        required: true
        type: choice
        options:
          - generate-morning
          - generate-afternoon
          - email-morning
          - email-afternoon

concurrency:
  group: scheduled-briefing-jobs-${{ inputs.task || github.run_id }}
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve task
        id: resolve
        shell: bash
        run: |
          task="${{ inputs.task }}"

          echo "task=${task}" >> "$GITHUB_OUTPUT"
          echo "Resolved task: ${task}"

      - name: Trigger scheduled API endpoint
        shell: bash
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          BRIEFING_BASE_URL: https://lemon-sea-076f4910f.6.azurestaticapps.net
          TASK: ${{ steps.resolve.outputs.task }}
        run: |
          if [ -z "${ADMIN_API_KEY}" ]; then
            echo "Missing required GitHub secret: ADMIN_API_KEY"
            exit 1
          fi

          case "${TASK}" in
            generate-morning)
              endpoint="/api/ops/run-daily-briefing?edition=Morning"
              ;;
            generate-afternoon)
              endpoint="/api/ops/run-daily-briefing?edition=Afternoon"
              ;;
            email-morning)
              endpoint="/api/ops/send-briefing-email?edition=Morning"
              ;;
            email-afternoon)
              endpoint="/api/ops/send-briefing-email?edition=Afternoon"
              ;;
            *)
              echo "Unknown task: ${TASK}"
              exit 1
              ;;
          esac

          echo "Calling scheduled task: ${TASK}"
          curl --fail --silent --show-error --retry 3 --retry-delay 20 \
            -H "x-admin-key: ${ADMIN_API_KEY}" \
            -H "accept: application/json" \
            "${BRIEFING_BASE_URL}${endpoint}"
